<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment-0.5</title>
    <!-- Tailwind and Daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
    <main>
      <section
        class=" w-[420px] md:w-[500px] mx-auto bg-[#FFFFFF] shadow rounded-md mt-10 h-[800px] "
      >
        <div class="pt-5">
          <img class="mx-auto" src="./assets/github-logo.png" alt="" />
          <div class="text-center mt-10">
            <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
            <p class="text-[#64748B]">Sign in to manage your issues</p>
          </div>
          <div class="mt-10 mx-8 border border-white p-5">
            <div class="mb-5">
              <label for=""
                ><span class="text-[18px] mb-4">Username: </span><br />
                <input
                  class="py-2 pr-20 md:pr-42 pl-4 rounded-md shadow-md border border-white"
                  type="text"
                  name=""
                  id="input-admin"
                  maxlength="5"
                  value="admin"
                  placeholder="Enter Username"
                />
                <p class="mt-2 text-[#4A00FF]">Default: admin</p>
              </label>
            </div>
            <div class="mb-5">
              <label for=""
                ><span class="text-[18px] mb-4">Password: </span><br />
                <input
                  class="py-2 pr-20 md:pr-42 pl-4 rounded-md shadow-md border border-white"
                  type="text"
                  name=""
                  id="input-pin"
                  maxlength="8"
                  placeholder="Enter Password"
                />
                <p class="mt-2 text-[#4A00FF]">Default: admin123</p>
              </label>
            </div>
          </div>
          <div class="ml-5">
            <button id="sign-in-btn" class="btn btn-primary mt-4 px-36 md:px-52 py-6 rounded-xl hover:bg-[#4A00FF] text-[18px]">
              Sign In
            </button>
          </div>
        </div>
        <div class="flex items-center w-[90%] mx-auto my-6">
          <div class="grow border-t border-solid border-gray-400"></div>
          <span class="mx-4 text-gray-500 font-medium">OR</span>
          <div class="grow border-t border-solid border-gray-400"></div>
        </div>
        <div class="text-center">
          <p class="text-[#64748B]">Demo Credentials:</p>
          <div class="bg-[#F8FAFC] shadow py-4 w-[90%] mx-auto">
            <h2 class="font-bold">Username: <span class="font-medium text-[#64748B]">admin</span></h2>
            <h2 class="font-bold">Password: <span class="font-medium text-[#64748B]">admin123</span></h2>
          </div>
        </div>
      </section>
    </main>

    <!-- script -->
     <script src="./script/login.js"></script>
  </body>
</html>
