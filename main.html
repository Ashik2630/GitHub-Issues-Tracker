<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Main-Page</title>
  </head>
  <!-- font-awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- Tailwind and Daisyui -->
  <link
    href="https://cdn.jsdelivr.net/npm/daisyui@5"
    rel="stylesheet"
    type="text/css"
  />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Google Font  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
    rel="stylesheet"
  />
  <style>
    * {
      font-family: "Geist", sans-serif;
    }
  </style>
  <body>
    <!-- Navbar-section -->
    <section class="bg-bage-100 shadow py-4">
      <nav class="flex justify-between">
        <div class="flex items-center gap-2 ml-20">
          <img class="w-10" src="./assets/github-logo.png" alt="" />
          <h1 class="text-2xl font-semibold">GitHub Issues Tracker</h1>
        </div>
        <div class="join mr-10">
          <div>
            <label class="input validator join-item">
              <input type="email" placeholder="Search issues..." required />
            </label>
          </div>
          <button class="btn btn-primary join-item">
            <img src="./assets/plus.png" alt="" /> New Issue
          </button>
        </div>
      </nav>
    </section>
    <!-- main-section -->
    <!-- button-section -->
    <main class="container mx-auto mt-10">
      <div class="flex gap-4 bg-white shadow py-4 pl-2">
        <button
          onclick="toggleStyle('all-btn')"
          id="all-btn"
          class="btn btn-primary px-8"
        >
          All
        </button>
        <button
          onclick="toggleStyle('open-btn')"
          id="open-btn"
          class="btn btn-outline px-8"
        >
          Open
        </button>
        <button
          onclick="toggleStyle('closed-btn')"
          id="closed-btn"
          class="btn btn-outline px-8"
        >
          Closed
        </button>
      </div>

      <div id="issues-count" class="bg-white shadow py-10 mt-10">
        <div class="flex justify-between">
          <div class="flex gap-5">
            <img
              id="all-img"
              class="ml-10"
              src="./assets/Aperture.png"
              alt=""
            />
            <div class="flex justify-between">
              <div>
                <h1><span id="count">0</span> Issues</h1>
                <p>Track and manage your project issues</p>
              </div>
            </div>
          </div>
          <div class="flex items-center gap-6 text-sm mr-5">
            <div class="flex items-center gap-2">
              <span class="w-3 h-3 bg-green-500 rounded-full"></span>
              <span class="text-gray-700">Open</span>
            </div>

            <div class="flex items-center gap-2">
              <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
              <span class="text-gray-700">Closed</span>
            </div>
          </div>
        </div>
      </div>

      <div id="issues-container" class="grid grid-cols-4 gap-5 mt-6"></div>
    </main>
        

    <!-- script -->
    <script src="./script/main.js"></script>
  </body>
</html>
